services:
  postgres:
    image: postgres:17-alpine
    container_name: kirenina-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kirenina
      POSTGRES_PASSWORD: kirenina_dev_2024
      POSTGRES_DB: kirenina
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirenina"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kirenina-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kirenina-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000" # Frontend
      - "3001:3001" # Backend API
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://kirenina:kirenina_dev_2024@postgres:5432/kirenina?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=kirenina-dev-secret-change-in-production
    volumes:
      # Synchroniser le code local avec le conteneur pour le Hot Reload
      - .:/app
      # Ignorer les node_modules locaux pour forcer l'utilisation de ceux du conteneur (compatibilité Windows/Linux)
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared-types/node_modules
      - /app/packages/game-logic/node_modules
      - /app/packages/utils/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kirenina-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kirenina.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
